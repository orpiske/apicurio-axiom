name: Verify Build Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Verify Build
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '25'

      - name: Build and run tests
        run: ./build.sh

  ui-build:
    name: UI Build Check
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: TypeScript type check and build
        run: npm run build
        working-directory: ui
