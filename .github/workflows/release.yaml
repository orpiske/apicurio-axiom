name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release Apitomy Axiom
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'
    timeout-minutes: 30

    steps:
      # ── Setup ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config --global user.name "apitomy-ci"
          git config --global user.email "apitomy.ci@gmail.com"

      # ── Determine release version from pom.xml ───────────────────────
      - name: Determine release version
        id: version
        run: |
          SNAPSHOT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          RELEASE_VERSION="${SNAPSHOT_VERSION%-SNAPSHOT}"
          echo "release-version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${RELEASE_VERSION}"

      # ── Set release version ──────────────────────────────────────────
      - name: Set release version in pom.xml files
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.release-version }} -DgenerateBackupPoms=false -Pui

      # ── Build and test ───────────────────────────────────────────────
      - name: Build application with UI
        run: ./build-release.sh

      # ── Commit, tag, and push release ────────────────────────────────
      - name: Commit release version
        run: |
          git add -A
          git commit -m "Release ${{ steps.version.outputs.release-version }}"

      - name: Tag release
        run: |
          git tag v${{ steps.version.outputs.release-version }}

      - name: Push release commit and tag
        run: |
          git push origin HEAD
          git push origin v${{ steps.version.outputs.release-version }}

      # ── Create GitHub Release ────────────────────────────────────────
      - name: Rename uber-jar for release
        run: |
          cp app/target/apitomy-axiom-app-${{ steps.version.outputs.release-version }}-runner.jar \
             app/target/apitomy-axiom-${{ steps.version.outputs.release-version }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release-version }}
          name: ${{ steps.version.outputs.release-version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.release-version, 'RC') || contains(steps.version.outputs.release-version, 'alpha') || contains(steps.version.outputs.release-version, 'beta') }}
          files: |
            app/target/apitomy-axiom-${{ steps.version.outputs.release-version }}.jar

      # ── Prepare next development version ─────────────────────────────
      - name: Compute next SNAPSHOT version
        id: next-version
        run: |
          RELEASE="${{ steps.version.outputs.release-version }}"
          MAJOR=$(echo "$RELEASE" | cut -d. -f1)
          MINOR=$(echo "$RELEASE" | cut -d. -f2)
          PATCH=$(echo "$RELEASE" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          echo "next-version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next development version: ${NEXT_VERSION}"

      - name: Set next SNAPSHOT version in pom.xml files
        run: |
          mvn versions:set -DnewVersion=${{ steps.next-version.outputs.next-version }} -DgenerateBackupPoms=false -Pui

      - name: Commit and push SNAPSHOT version
        run: |
          git add -A
          git commit -m "Prepare next development version ${{ steps.next-version.outputs.next-version }}"
          git push origin HEAD
