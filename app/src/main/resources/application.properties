# =============================================================================
# Apicurio Axiom - Application Configuration
# =============================================================================

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors.origins=/.*/

# --- Database (default: H2 for dev and test) ---
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:axiom;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# --- Database (prod profile: PostgreSQL) ---
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/axiom
%prod.quarkus.datasource.username=axiom
%prod.quarkus.datasource.password=axiom
%prod.quarkus.hibernate-orm.database.generation=none

# --- GitHub Integration ---
# API token for accessing GitHub (required for private repos, recommended for rate limits)
# axiom.github.token=ghp_xxxx
# Polling interval for GitHub API (default: 60 seconds)
axiom.github.poll-interval=60s

# --- Manager ---
# Confidence threshold (0.0-1.0) — decisions below this are held for user review
axiom.manager.confidence-threshold=0.7
# Manager subprocess timeout in seconds
axiom.manager.timeout-seconds=120
# Maximum agentic turns for the Manager
axiom.manager.max-turns=5
# Model override for the Manager (optional)
# axiom.manager.model=claude-sonnet-4-6

# --- Claude Code ---
# Model to use (optional, defaults to Claude Code's default)
# axiom.claude-code.model=claude-sonnet-4-6
# Maximum agentic turns per task
axiom.claude-code.max-turns=50
# Maximum cost per task in USD
axiom.claude-code.max-budget-usd=5.0
# Subprocess timeout in seconds
axiom.claude-code.timeout-seconds=600

# --- Workspaces ---
# Root directory for project git clones
axiom.workspace.root=${user.home}/.axiom/workspaces

# --- Logging ---
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.apicurio.axiom".level=DEBUG
